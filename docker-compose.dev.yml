services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: postgres_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: backendtest
      POSTGRES_USER: takahashi
      POSTGRES_PASSWORD: takahashi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U takahashi -d backendtest"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Laravel Backend (Development)
  backend:
    build:
      context: ./backend-test
      dockerfile: Dockerfile
    container_name: laravel_backend_dev
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8080:8080"
    volumes:
      - ./backend-test:/var/www/html
      - vendor_dev:/var/www/html/vendor
      - node_modules_dev:/var/www/html/node_modules
      - storage_dev:/var/www/html/storage/app
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=backendtest
      - DB_USERNAME=takahashi
      - DB_PASSWORD=takahashi
      - LOG_LEVEL=debug
      - CACHE_DRIVER=file
      - SESSION_DRIVER=file
      - QUEUE_CONNECTION=database
      - BROADCAST_CONNECTION=reverb
      - REVERB_APP_ID=my-app-id
      - REVERB_APP_KEY=my-app-key
      - REVERB_APP_SECRET=my-app-secret
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
      - REVERB_SERVER_HOST=0.0.0.0
      - REVERB_SERVER_PORT=8080
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        composer install --no-interaction --optimize-autoloader &&
        if [ ! -f .env ]; then cp .env.example .env && php artisan key:generate; fi &&
        chmod -R 775 /var/www/html/storage /var/www/html/bootstrap/cache &&
        chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache &&
        php artisan migrate:fresh --force --seed &&
        (php artisan serve --host=0.0.0.0 --port=8000 &) &&
        (php artisan queue:work --sleep=3 --tries=3 --max-jobs=100 &) &&
        sleep 5 &&
        php artisan reverb:start --host=0.0.0.0 --port=8080
      "

  # Vite React Frontend (Development with HMR)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vite_frontend_dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - node_modules_frontend:/app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8000/api
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      - backend
    stdin_open: true
    tty: true
    command: >
      sh -c "
        npm install &&
        npm run dev -- --host 0.0.0.0 --port 5173
      "

volumes:
  postgres_data_dev:
  vendor_dev:
  node_modules_dev:
  storage_dev:
  node_modules_frontend:
